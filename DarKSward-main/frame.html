<!DOCTYPE html>
<html>
<head>
  <title></title>
</head>
<body>
<script>
var ws = null;
var wsHost = 'ws://' + window.location.hostname + ':8001';
var logBuffer = [];
var connected = false;

function connectWS() {
    try {
        ws = new WebSocket(wsHost);
        ws.onopen = function() {
            connected = true;
            while(logBuffer.length > 0) {
                ws.send(logBuffer.shift());
            }
        };
        ws.onclose = function() {
            connected = false;
            setTimeout(connectWS, 2000);
        };
        ws.onerror = function() {};
    } catch(e) {
        setTimeout(connectWS, 2000);
    }
}
connectWS();

function sendLog(data) {
    var msg = JSON.stringify(data);
    if (connected && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(msg);
    } else {
        logBuffer.push(msg);
    }
}

window.parentLog = function(tag, message, logType) {
    console.log('[' + tag + ']', message);
    sendLog({ type: 'log', tag: tag, message: String(message), logType: logType || 'normal' });
    try { parent.postMessage({ type: 'log', tag: tag, message: String(message) }, '*'); } catch(e) {}
};

window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'worker_log') {
        sendLog({ type: 'log', tag: 'WORKER', message: e.data.message });
    }
});

window.parentStage = function(stage, status, percent, isError) {
    sendLog({ type: 'stage', stage: stage, status: status, percent: percent, isError: isError || false });
};

window.parentComplete = function() {
    sendLog({ type: 'complete' });
};

window.parentError = function(message) {
    sendLog({ type: 'error', message: String(message) });
};

window.onerror = function(msg, url, line, col, error) {
    window.parentError(msg + ' at line ' + line);
    return false;
};

window.parentLog('LOAD', 'frame.html loaded');
</script>
<script defer="defer" src="./rce_loader.js"></script>
</body>
</html>
